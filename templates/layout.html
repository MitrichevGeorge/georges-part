<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}InnoTour{% endblock %}</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .font-comfortaa {
            font-family: 'Comfortaa', cursive;
        }
    </style>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_YANDEX_API_KEY&lang=en_US" type="text/javascript"></script>

    <style type="text/tailwindcss">
        body,
        input,
        button,
        a,
        span,
        p,
        label {
            font-family: Inter, sans-serif;
        }

        /* h1, h2, h3, h4, h5, h6 {
            font-family: 'Inter', sans-serif !important;
        } */

        #hover-tooltip {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3), 
                        0 4px 6px -4px rgb(0 0 0 / 0.3);
            backdrop-filter: blur(12px);
        }

        #tooltip-name {
            font-family: Inter, sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            line-height: 1.3;
            color: white;
            margin-bottom: 0.375rem;
        }

        #tooltip-desc {
            font-size: 0.875rem;
            line-height: 1.5;
            color: #d1d5db;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #tooltip-addr {
            font-size: 0.75rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #tooltip-addr::before {
            content: "📍";
            opacity: 0.7;
        }

        #hover-tooltip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(8px);
        }

        #hover-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-white flex flex-col">

    {% include "components/header.html" %}

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
