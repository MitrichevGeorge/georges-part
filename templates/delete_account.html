<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление аккаунта | InnoTour</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen bg-slate-900 text-white">
    {% include "components/header.html" %}
    <main class="flex min-h-[calc(100vh-64px)] items-center justify-center px-6 py-12">
        <div class="w-full max-w-md rounded-2xl border border-gray-800 bg-gray-900 p-8 shadow-xl">
            <div class="mb-8 text-center">
                <i data-lucide="triangle-alert" class="mx-auto mb-4 h-12 w-12 text-red-500"></i>
                <h1 class="text-3xl font-bold">
                    Удаление аккаунта
                </h1>
                <p class="mt-3 text-gray-400">
                    Это действие нельзя отменить.
                </p>
            </div>

            {% if error %}
            <div class="mb-6 rounded-xl border border-red-900 bg-red-950/40 p-4 text-sm text-red-400">
                {{ error }}
            </div>
            {% endif %}

            <div class="mb-6 rounded-xl bg-gray-800 p-4">
                <p class="text-sm text-gray-400">
                    Вы удаляете аккаунт:
                </p>
                <p class="mt-1 text-lg font-semibold text-white">
                    {{ user.login }}
                </p>
            </div>

            <form method="POST" action="{{ url_for('auth.delete_account') }}" class="space-y-5">

                <div>
                    <label class="mb-2 block text-sm text-gray-400">
                        Введите подтверждение
                    </label>
                    <input type="text" name="confirm" placeholder="Я УВЕРЕН"
                        class="w-full rounded-xl border border-gray-700 bg-gray-800 px-4 py-3 text-white outline-none transition focus:border-red-500">
                </div>

                <div>
                    <label class="mb-2 block text-sm text-gray-400">
                        Введите пароль
                    </label>
                    <input type="password" name="password" placeholder="Ваш пароль"
                        class="w-full rounded-xl border border-gray-700 bg-gray-800 px-4 py-3 text-white outline-none transition focus:border-red-500">
                </div>

                <button
                    class="flex w-full items-center justify-center gap-2 rounded-xl bg-red-600 px-6 py-3 font-semibold transition hover:bg-red-500">
                    <i data-lucide="trash-2" class="h-5 w-5"></i>
                    Удалить аккаунт
                </button>

            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
