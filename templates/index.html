{% extends "layout.html" %}

{% block title %}Главная | InnoTour{% endblock %}

{% block content %}

<main class="mx-auto flex max-w-7xl flex-col items-center justify-center px-6 py-24">

    <h1 class="mb-6 text-5xl font-bold">
        Hello World
    </h1>

    {% if session.get("logged_in") %}

    <p class="text-lg text-gray-300">
        Добро пожаловать,
        <span class="font-semibold text-lime-400">
            {{ session["username"] }}
        </span>
    </p>

    {% else %}

    <a href="{{ url_for('auth.login') }}"
       class="rounded-xl bg-lime-600 px-6 py-3 font-semibold transition hover:bg-lime-500">
        Войти
    </a>

    {% endif %}

</main>

{% endblock %}
