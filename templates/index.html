<!DOCTYPE html>
<html lang="ru" class="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Главная | InnoTour</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style type="text/tailwindcss">
        h1 {
            font-family: "Playfair Display", serif;
        }

        body,
        p,
        a,
        button,
        input,
        span {
            font-family: "Inter", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen bg-slate-900 text-white">

    {% include "components/header.html" %}

    <main class="mx-auto flex max-w-7xl flex-col items-center justify-center px-6 py-24">

        <h1 class="mb-6 text-5xl font-bold">
            Hello World
        </h1>

        {% if session.get("logged_in") %}

        <p class="text-lg text-gray-300">
            Добро пожаловать,
            <span class="font-semibold text-lime-400">
                {{ session["username"] }}
            </span>
        </p>

        {% else %}

        <a href="{{ url_for('auth.login') }}"
           class="rounded-xl bg-lime-600 px-6 py-3 font-semibold transition hover:bg-lime-500">
            Войти
        </a>

        {% endif %}

    </main>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
