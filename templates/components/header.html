<header class="w-full border-b border-gray-800 bg-gray-900">
    <div class="flex h-16 w-full items-center justify-between px-8">
        <a href="{{ url_for('main.index') }}" class="text-xl font-bold tracking-widest uppercase text-white transition hover:text-lime-400">
            InnoTour
        </a>
        <nav class="flex items-center gap-8">
            <a href="{{ url_for('main.reviews_page') }}" class="text-gray-300 transition hover:text-white">Отзывы</a>
            <a href="{{ url_for('main.map_view') }}" class="text-gray-300 transition hover:text-white">Карта</a>
            <a href="{{ url_for('main.streetview_view') }}" class="text-gray-300 transition hover:text-white">StreetView</a>
            <a href="{{ url_for('main.tour_guide', attraction_id=1) }}" class="text-gray-300 transition hover:text-white">Гид</a>

            {% if session.get("logged_in") %}
                <div class="ml-4 flex items-center gap-3 border-l border-gray-700 pl-6">
                    <a href="{{ url_for('auth.profile') }}" class="flex items-center gap-2 rounded-lg px-3 py-2 text-white transition hover:bg-gray-800">
                        <i data-lucide="user" class="h-4 w-4 text-lime-400"></i>
                        <span>{{ session.get("username") }}</span>
                    </a>
                    <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 font-medium text-white transition hover:bg-red-500">
                        <i data-lucide="log-out" class="h-4 w-4"></i>
                        Выйти
                    </a>
                </div>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="rounded-lg bg-lime-600 px-4 py-2 font-medium text-white transition hover:bg-lime-500 whitespace-nowrap inline-flex items-center gap-2"><i data-lucide="log-in"></i> Войти</a>
            {% endif %}
        </nav>
    </div>
</header>
