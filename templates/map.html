{% extends "layout.html" %}

{% block title %}Карта | InnoTour{% endblock %}

{% block content %}

<div class="w-full h-full">
    <div id="map-container" class="w-full" style="height: 100vh;">
        <div id="map" class="w-full h-full"></div>

        <div id="hover-tooltip" class="hover-tooltip fixed bottom-4 left-4 bg-gray-900 rounded-lg p-4 hidden max-w-xs border border-gray-700 z-40" style="display:none;">
            <div class="mb-3">
                <img id="tooltip-img" src="" alt="attraction" class="w-full h-32 object-cover rounded">
            </div>
            <div class="ml-5 font-bold">
                <h3 id="tooltip-name" class="font-bold text-white mb-1">Attraction</h3>
                <p id="tooltip-desc" class="text-sm text-gray-300 mb-2">Description</p>
                <span class="text-xs text-gray-400" id="tooltip-addr"></span>
            </div>
        </div>

        <div id="detail-panel" class="detail-panel fixed right-4 top-20 bg-gray-900 rounded-lg shadow-lg z-50 max-w-sm border border-gray-700 overflow-y-auto" style="display:none; max-height: 80vh;">
            <button class="panel-close absolute top-3 right-3 text-white text-2xl hover:text-gray-300 z-10" id="panel-close">&times;</button>

            <div class="panel-image">
                <img id="panel-img" src="" alt="attraction" class="w-full h-48 object-cover">
            </div>

            <div class="panel-body p-4">
                <h2 id="panel-name" class="text-2xl font-bold mb-2">Attraction</h2>
                <p id="panel-desc" class="text-gray-300 mb-2">Description</p>
                <p class="panel-address text-sm text-gray-400 mb-3" id="panel-addr"></p>

                <div class="panel-rating mb-4 flex items-center gap-2">
                    <span>⭐</span>
                    <span id="panel-rating" class="text-lg font-semibold">0.0</span>
                    <span class="text-sm text-gray-400">(<span id="panel-review-count">0</span> отзывов)</span>
                </div>

                <div class="reviews-section">
                    <h4 class="font-bold mb-3">Отзывы</h4>
                    <div id="reviews-list" class="reviews-list mb-4 space-y-3">
                        <p class="no-reviews text-gray-400 text-sm">Пока нет отзывов</p>
                    </div>

                    {% if session.get('logged_in') %}
                        <form id="review-form" class="review-form space-y-2">
                            <input type="hidden" id="review-attraction-id" value="">
                            <div class="form-row space-y-2">
                                <select id="review-rating" required class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
                                    <option value="">Оценка</option>
                                    <option value="5">⭐⭐⭐⭐⭐</option>
                                    <option value="4">⭐⭐⭐⭐</option>
                                    <option value="3">⭐⭐⭐</option>
                                    <option value="2">⭐⭐</option>
                                    <option value="1">⭐</option>
                                </select>
                                <textarea id="review-text" placeholder="Напишите отзыв…" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white text-sm"></textarea>
                                <button type="submit" class="btn-submit-review w-full bg-lime-600 hover:bg-lime-500 text-white font-semibold py-2 rounded transition">Отправить</button>
                            </div>
                        </form>
                    {% else %}
                        <p class="login-to-review text-sm text-gray-400">🔒 <a href="{{ url_for('auth.login') }}" class="text-lime-400 hover:text-lime-300">Войдите</a> чтобы оставить отзыв</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ATTRACTIONS = {{ attractions|tojson|safe }};
    const STATIC_URL = "{{ url_for('static', filename='') }}";
</script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% endblock %}
