<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | InnoTour</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">

    <style type="text/theme">
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        p, label, input, button, a, span {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dark bg-white dark:bg-[#0f172a] dark:text-white flex flex-col min-h-dvh">
    {% include "components/header.html" %}
    
    <main class="flex-1 flex justify-center items-center px-4 py-12">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-950 dark:text-white mb-2">Вход в систему</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400">Добро пожаловать обратно в InnoTour</p>
            </div>

            {% if error %}
            <div class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 dark:bg-red-950/30 dark:border-red-900 dark:text-red-400 p-4 rounded-xl mb-6 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Логин</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus
                            class="w-full pl-11 pr-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-lime-500 focus:border-lime-500 outline-none transition-all text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Пароль</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" name="password" required
                            class="w-full pl-11 pr-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-lime-500 focus:border-lime-500 outline-none transition-all text-sm">
                    </div>
                </div>

                <button type="submit" name="submit"
                    class="w-full py-3 bg-lime-600 hover:bg-lime-500 text-white font-semibold rounded-xl shadow-lg shadow-lime-600/10 hover:shadow-lime-500/20 transition-all duration-200 text-sm mt-2 cursor-pointer">
                    Войти
                </button>
            </form>

            <div class="text-center mt-6 pt-6 border-t border-gray-100 dark:border-gray-800 text-sm text-gray-500 dark:text-gray-400">
                Нет аккаунта? 
                <a href="{{ url_for('auth.register') }}" class="text-lime-600 dark:text-lime-400 font-medium hover:underline ml-1">Зарегистрироваться</a>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const menuBtn = document.getElementById('userMenuBtn');
        const dropdown = document.getElementById('userDropdown');

        if (menuBtn && dropdown) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('hidden');
            });

            document.addEventListener('click', () => {
                dropdown.classList.add('hidden');
            });
        }
    </script>
</body>

</html>
