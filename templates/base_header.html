<header class="border-b border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-900">
    <div class="mx-auto flex h-16 items-center gap-8 px-4 sm:px-6 lg:px-8">
        <a href="/" class="group flex">
            <span class="text-xl font-bold tracking-widest text-gray-900 uppercase transition-colors group-hover:text-lime-600 dark:text-white group-hover:dark:text-lime-400">InnoTour</span>
        </a>
        <nav aria-label="Global" class="hidden md:block ml-auto">
            <ul class="flex items-center gap-6 text-sm">
                <li>
                    <a class="text-gray-500 transition hover:text-gray-500/75 dark:text-white dark:hover:text-white/75" href="#"> Главная </a>
                </li>
                <li>
                    <a class="text-gray-500 transition hover:text-gray-500/75 dark:text-white dark:hover:text-white/75" href="#"> Карта </a>
                </li>
                <li>
                    <a class="text-gray-500 transition hover:text-gray-500/75 dark:text-white dark:hover:text-white/75" href="#"> Рекомендованный маршрут </a>
                </li>
                {% if session.get('logged_in') %}
                <li class="flex items-center gap-4 border-l border-gray-200 dark:border-gray-700 pl-6">
                    <span class="flex items-center gap-1.5 font-medium text-gray-700 dark:text-gray-200">
                        <i data-lucide="user" class="w-4 h-4 text-lime-500"></i>
                        {{ session.get('username') }}
                    </span>
                    <a class="flex items-center gap-1 text-red-500 hover:text-red-400 font-medium transition-colors" href="{{ url_for('auth.logout') }}">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Выйти
                    </a>
                </li>
                {% else %}
                <li class="border-l border-gray-200 dark:border-gray-700 pl-6">
                    <a class="rounded-md bg-lime-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-lime-500 transition-colors" href="{{ url_for('auth.login') }}"> Войти </a>
                </li>
                {% endif %}
            </ul>
        </nav>
    </div>
</header>
